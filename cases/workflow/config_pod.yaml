# 10-hour POD-snapshot run (decomposed, ARM). Produces T_CO/T_NOx per selected hour.
mesh_case:   "../flowCaseBig"        # FROZEN decomposed mesh + flow template (0/, system, dicts)
disp_case:   "../dispersionCaseBig"  # dispersion template (0/T, receptors, fvOptions)
tools:       "../tools"
work_dir:    "runs_pod"              # each run lives in its OWN folder here (parallel-safe)
results_dir: "results_pod"
python_bin:  "/usr/bin/python3"      # ABSOLUTE numpy python (set to the cluster's)

pollutants:  [CO, NOx]
scenario:    reference               # POD is over hours; one scenario
nprocs:      384                     # = the FROZEN mesh's decomposition (8 nodes x 48)
DT:          1.0
flow_2ndorder_iters: 2000
hours_file:  "selected_hours.txt"    # from select_hours.py; falls back to `hours:` below
hours:       [0, 1, 3, 5, 8, 9, 11, 14, 17, 23]
